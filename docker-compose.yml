version: "3.9"

services:

  # ── Infrastructure ─────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: codeagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: codeagent-postgres
    environment:
      POSTGRES_DB: codeagent
      POSTGRES_USER: codeagent
      POSTGRES_PASSWORD: codeagent_dev_password_change_in_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeagent"]
      interval: 10s
      timeout: 3s
      retries: 3

